body:
  text: 無依道人徐昌治覲周父解男徐升貞徐乾貞徐拱樞徐貞同挍般若波羅蜜多心經此梵語也般若云智慧即人之本心超情離見湛寂圓悟之稱波羅蜜云到彼岸多即眾生心即人心經常也法也心是般若之體般若是心之用彼岸是般若心中所詣之實境觀自在菩薩觀有二義一者能觀觀慧二者所觀觀相能所契證名為自在以此契證之理而導眾生即名菩薩以一切眾生妄知莫返而起三毒造種種業輪迴三界昇沈上下窮劫無有得自在者唯此菩薩了諸法空境智如如在生死不為生死根絆在涅槃不為涅槃果縛自者顯物物頭頭無非自己在者顯塵塵剎剎靡不充周行深般若波羅蜜多時行者乃能修習之行也深般若者乃所契證之智也時者能所雙忘智理俱泯之時也此般若無形無相無方無所無內無外無邊無表無容擬議故曰深時字追指曠劫以前而言從此一得相應則直至未來際始終不離深般若矣照見五蘊皆空度一切苦厄此釋前菩薩契入甚深般若何由致耶以一念中見之所及即名色蘊領納所見即名受蘊思惟不已即名想蘊遷變流動即名行蘊了別剖斷即名識蘊五者陰隱沉淪纏縛人心故謂之蘊一切苦厄指眾生也言能修般若之菩薩自心清淨圓融略無一點罣礙便能度世間眾生之有罣有礙而有苦厄者和盤邈出心字而不顯明心字所以為妙一切五蘊本來清淨常住一心原是如來藏之真空守口攝意身莫犯亦度世法也出世三乘亦不過依五蘊破除深淺建立離五蘊亦無三乘諸法也凡夫無智為五蘊所縛二乘智淺為斷空所縛深般若照見五蘊本來自空即五蘊離五蘊不必屏除五蘊而後見其空也這五蘊就是苦五蘊既空誰為苦者舍利子色不異空空不異色色即是空空即是色梵語舍利此云鶖葢此尊者其母目利如鶖鳥之目時人借以贊稱也尊者因母得名故呼為舍利子此尊者聲聞中智慧第一以智慧堪入般若故世尊特召告之觀自在菩薩照見五蘊皆空這不是蘊自為蘊空自為空乃一體而即是的色是法相之首五蘊之初故諸經欲釋空義皆約色說一則以色是堅固妄想凝結而成是眾生最易執著處二則與虗空體相敵對角立是最難和會處若於此勘破則其餘四蘊瓦解氷消所謂一根既返源六根成解脫也小乘認色為實有異於空之虗無遂見色能障空而空為色礙菩薩見一切色俱無自性此無性之色即是無我空理初不見有一絲毫可以點染得空亦不見一絲毫可以夾雜得空色相與空相初無差別故云不異二乘與初心菩薩見空為斷滅異於色之染污遂致滅色證空而色為空礙菩薩見自性空為真空周遍法界此無我空理徧在一切色中不見空外有個染污的色相亦不見空中有可斷滅的色相空體與色體了無變動故云即是受想行識亦復如是此以四蘊例推前之色蘊皆從緣生也所言受者領納為性領順違俱非之三境皆無實體若領納于順終有順性遇違境時理不應起是知受即是空所言想蘊亦無實體若想前境前境有體不復想後既復想後則知無體非空而何所言行蘊念念遷謝無有寔性若性在內不應遷外性若在外不應遷內是知內外無得非空而何所言識蘊識有其三一曰阿賴耶二曰末那三曰了境此三識其性元虗互起互滅本無可得非空而何所謂五蘊皆空者如此不離五蘊而空五蘊非行深般若到彼岸之菩薩能如是乎舍利子是諸法空相不生不滅不垢不淨不增不減前推空蘊緣起無體此直會歸自心顯此經以心為主而亦未涉心字上文已說明五蘊皆空恐人不能領略認作觀照功夫邊事信不及實相本然所以就諸法中指出空相來使知本來實相尋常看色空是個相反的那知便是真如自相故復呼舍利弗而告之曰五蘊即空其實不獨五蘊一切諸法都是即空的諸法從緣而生緣生無性其實法本無生諸法緣離則滅滅惟緣滅其實法本無滅是不生不滅的雖在有漏色中而體空不染雖在無漏色內而空體如故是不垢不淨的此諸法空相從來修證不到德滿不增本來變壞不得障盡非滅是不增不減的是故空中無色無受想行識無眼耳鼻舌身意無色聲香味觸法無眼界乃至無意識界此以五蘊六根六塵十二處而顯真空也葢將萬法緣起結歸自心而亦未顯言心眼根由明暗二塵相牽相引除其妄見還其本明都無所有耳根由動靜二塵相攝相援除其妄聽還其本聰都無所有鼻根舌根身根俱由生滅諸塵自離自合除其妄知還其本分都無所有意根由出入二塵相起相伏除其妄想還其本覺都無所有六塵又從根與識分別而有所謂若從耳聽終難會眼裏聞聲始得知身安意肯觸處皆恬根塵識俱無界從奚立總為迷心重者說五蘊為迷色重者說十二入為色心俱迷者說十八界此三科有則為三有業障無則為萬象俱空三有者三世也亦三界也即欲界色界無色界五蘊只是色心二字眼耳鼻舌身色聲香味觸為色法意為心法佛性真空有二種用一自性用一隨緣用譬如明鏡空懸不問物之來否鏡光具能現之功曰自性用忽有物至隨物現形曰隨緣用十二處以內根外塵各有處所故六識分別六塵執妄成差各有界限名十八界雖三六並舉重在六識六識本唯一識無無明亦無無明盡乃至無老死亦無老死盡承上言凡人有明有不明皆眼界為之累耳眼界既空明到盡處何無無明不抵于盡到此纔是眼之真空本相生老病死極是意中牽纏不能忘情處意識界既空生到盡處何無老死不抵於盡到此纔是意之真空本相真空中本來常覺覺則不動當其動時原是堪然不動純一大光明藏何從而有無明自行識以至老死當處發生隨處滅盡緣無可緣起原無起本性空六根之身且無將甚的為老死而謂有老死盡耶無苦集滅道苦集屬世間因果也滅道出世間因果也世間因果者集是招感性苦是逼迫性以貪嗔癡招感報業而逼迫也此逼迫性不出八苦唯聲聞人知此苦便修戒定慧道而入寂滅涅槃十二緣既是大光明藏那有流轉還滅種種差別次第耶中下根則須說苦方畏說滅方忻說集方厭說道方修故說四諦法此方便中之方便若是真性空中生死即法身結業即解脫煩惱即般若有何苦集可以厭離亦無滅道可以修證四諦亦是無有的四皆名諦者以如來實語永無變易故也說此四諦而先果後因者欲令眾生知苦而斷集樂滅而慕道始可離苦得樂也無智亦無得此世尊直以無智無得統結上意始焉以蘊與空參觀著力猶知有法有相至於根塵識界都斷而苦集滅道盡消渾身世兩忘心境俱融真空真理妙應無窮又烏知夫般若而有智與度一切苦厄而有得哉知空智與所知空理皆不可得曰無智無得以無所得故承上起下菩提薩埵依般若波羅蜜多故心無罣礙無罣礙故無有恐怖遠離顛倒夢想究竟涅槃至此纔揭出一個心字所謂結歸自心也葢前廣顯緣生即是性空般若一無所得故曰以無所得故菩薩依此性空般若圓證自心了無遺餘故曰依般若波羅蜜多故心無罣礙且此心剎那不住如大寶聚纖毫不存如閃電光無容擬議更無一物可作障礙心法如是之淨何恐怖而不除何顛倒之不遠何夢想之可亂何涅槃之不得其自在為何如菩提薩埵者能依之人也般若波羅蜜多者所依之法也菩薩於此無所得的真空著個依字色空生滅淨垢增減蘊界處入緣諦智得種種都是罣礙人心的法相惟般若照見真空到無所得處則蕩然一無罣礙何等自在觀至此業性都亡一切所作無有作者依而無依盡十方世界在自己光明裏安有一法與我為緣為對正智既明顛倒自息無端夢想消歸淨盡所謂眼若不睡諸夢自除心若不異萬法一如也無恐怖則出息不涉眾緣無夢想則入息不居陰界生滅既滅寂滅現前無餘涅槃方得究竟三世諸佛依般若波羅蜜多故得阿耨多羅三藐三菩提此顯諸佛亦依般若性空而圓證自心葢阿耨多羅雖然果稱亦實自心之別名也萬法至心而極名曰無上更無邪正等差名曰正等無法不了名曰正覺實覺昏迷之識性能照萬法之重衢是知三界無別法惟是一心造不惟菩薩如是修證三世諸佛莫不皆依般若得成正覺故知般若波羅蜜多是大神呪是大明呪是無上呪是無等等呪能除一切苦真實不虗故字緊接上文可見般若波羅蜜多是諸佛菩薩之托命而六百卷之真諦也其妙義豈易言哉慧性降魔是大神呪心燈破暗是大明呪莫可踰越是無上呪無可等倫是無等等呪其神通廣大果報無邊此結般若功用廣大除苦得樂決定無疑故說般若波羅蜜多呪即說呪曰揭諦揭諦波羅揭諦波羅僧揭諦菩提薩婆訶揭去也度也重言揭諦者自度而普度他也波羅揭諦者慧筏也波羅僧揭諦者普願同登彼岸也菩提薩婆訶者慈航無滯礙也佛說此呪天龍八部等眾護持此係密諦夫非護善遮惡之意呪者願也願諸眾生皆如我之得成正覺也亦云鬼神王之名號此經亦具三分觀自在菩薩至度一切苦厄屬序分葢因菩薩而序起法門也告舍利子至般若是大神呪屬正宗分正以性空會心與聲聞說也後說呪文意屬流通葢此流通非同他經以無相般若非可文言贊說弘持直於無言無說無思無解以默契於言先領略於物表是為真弘通般若真流傳正宗故以密呪宣在經末般若六百餘卷獨此名心經者以其不說枝葉而單說根本也奘師為性相二宗法主其於相宗集成百卷獨譯此卷掃盡諸相單說真空此是文殊智門却首舉觀自在者何正以諸佛說法單為眾生度苦若不發大悲心縱具根本智自救不了觀音是度苦厄大悲菩薩故首舉之以為真空妙智的榜樣此經凡六譯一東晉姚秦鳩摩羅什譯名摩訶般若波羅蜜大明呪經二唐玄奘譯名般若波羅蜜多心經三唐般若利言譯名與奘師譯同四宋法月譯名普遍智藏般若波羅蜜多經五宋施護譯名佛說聖佛母般若波羅蜜多經六元達里麻剌怛柰譯名出有壞聖母智慧到彼岸心經古傳奘師至罽賓國道險宿空室中忽有僧口授心經遂得降伏虎豹避遠魑魅達西域賢首以此經為釋迦牟尼佛說尋珠云此觀自在菩薩所說也施護本云世尊在靈鷲山中入甚深光明宣說三摩提竟舍利子白觀自在菩薩言若有人欲修學甚深般若法門者當云何修學而觀自在菩薩說此經此經乃世尊所說大品般若之精要故知菩薩之說即世尊之語也觀自在即觀世音一釋名二辨體三明宗四論用五判教相今題以法喻為名實相為體觀照為宗度苦為用大乘為教相附楞嚴經七處徵心先示三觀為開佛知見之根本次破妄心不在內而靈知之心在六根門頭明明不昧了了常知二掃除執心在外三破心不隨根心見山河亦應見眼若使心能見眼眼反為心所緣之境不是能生之根四破見暗不成見內合眼見暗之時名為反觀身中是則開眼見明之時應反觀己面若不見面內對不成五破心不隨合謂法有定相心無定體既無定體則無合處六因執中間先為審定中間在身在境而後兩破其中俱無定在七破無著世尊在般若會中談無著真宗不在內外中間正言心無處所無處住心不應復有所著法身無在而無不在始阿難計心在內在外潛根雙計隨合中間是以心為有在故世尊以無在破之及至第七又計心為無在世尊復以相有則在破之總顯無在無不在之旨如來十大弟子迦葉頭陀阿難多聞舍利弗智慧目連神通羅睺羅密行阿那律天眼富樓那說法迦旃延論義優波離持律須菩提解空皆稱第一大千世界相傳以須彌山為中分東西南北四大洲南閻浮提東弗于逮西瞿耶尼北單越一州分八所又有一中所為三十三天即謂忉利天成一小世界如此一千小世界曰小千如此一千小千世界曰中千又如此一千中千世界曰大千三次言千故謂三千大千至日月在此山半腰中繞山而行照處為晝背處為夜無餘涅槃涅槃已登彼岸超出輪迴是修行極地無餘有三一煩惱餘一業餘一果報餘非大乘最上乘未易臻此三乘一聲聞乘羅漢得道全賴佛語指示二緣覺乘辟支佛得道緣有感觸而心悟三菩薩乘不惟修行六度通修萬行志在廣濟是登大乘六度一布施為檀波羅蜜二持戒為尸羅波羅蜜三忍辱為羼提波羅蜜四精進為毘離耶波羅蜜五禪定為禪波羅蜜六智慧為般若波羅蜜六者全則登彼岸故云六度十地一歡喜地達佛境界一離垢地同異性滅一發光地淨極明生一現慧地明極光滿一現前地同異不生一難勝地性淨明露一遠行地盡真如際一不動地合真如心一善慧地發真如用一慈雲地覆涅槃海般若心經句義一卷清淨挺著收于閱經十二種第十
